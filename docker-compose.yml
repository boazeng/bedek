services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cmm
      POSTGRES_PASSWORD: cmm
      POSTGRES_DB: cmm
    volumes:
      - cmm_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cmm"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://cmm:cmm@db:5432/cmm
      CORS_ORIGINS: http://localhost:5173,http://localhost
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  cmm_pgdata:
