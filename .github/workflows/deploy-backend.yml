name: Deploy backend

# Auto-deploys the FastAPI Lambda + infra (SAM stack cmm-bedek) on every push to
# main that touches the backend or infra. Auth to AWS is via OIDC. Secrets/config
# come from repo Variables/Secrets. The runner is a clean environment, so
# `sam build` always does a full dependency resolve (avoids the incremental-cache
# bug that once shipped a Lambda missing mangum).
on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'infra/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch: {}   # allow manual runs from the Actions tab

permissions:
  id-token: write   # required for OIDC role assumption
  contents: read

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: SAM build & deploy
        working-directory: infra
        run: |
          # CRM service secret: single source of truth is SSM (set by the CRM-DB
          # stack). Read it at deploy time so it's never duplicated in GitHub
          # Secrets. Falls back to empty (integration disabled) if the deploy role
          # lacks ssm:GetParameter on it â€” the deploy still succeeds.
          CRM_SERVICE_KEY=$(aws ssm get-parameter --name tact-crm-service-key --with-decryption --query Parameter.Value --output text 2>/dev/null || echo "")
          sam build
          sam deploy \
            --stack-name cmm-bedek \
            --region "${{ vars.AWS_REGION }}" \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --no-progressbar \
            --parameter-overrides \
              VpcId=${{ vars.VPC_ID }} \
              SubnetIds=${{ vars.SUBNET_IDS }} \
              DBUsername=${{ vars.DB_USERNAME }} \
              DBPassword='${{ secrets.DB_PASSWORD }}' \
              JwtSecret='${{ secrets.JWT_SECRET }}' \
              SeedAdminEmail='${{ secrets.SEED_ADMIN_EMAIL }}' \
              SeedAdminPassword='${{ secrets.SEED_ADMIN_PASSWORD }}' \
              GoogleClientId=${{ vars.GOOGLE_CLIENT_ID }} \
              CrmServiceKey="$CRM_SERVICE_KEY" \
              DomainName=${{ vars.DOMAIN_NAME }} \
              AcmCertificateArn=${{ vars.ACM_CERTIFICATE_ARN }}

      - name: Apply DB migrations (invoke cmm-bedek-migrate)
        # The API Lambda runs with lifespan="off", so it never applies schema
        # migrations itself. Invoke the migrate function after every deploy so new
        # columns/tables are added (and the super_admin ensured). Idempotent.
        run: |
          aws lambda invoke \
            --function-name cmm-bedek-migrate \
            --region "${{ vars.AWS_REGION }}" \
            /tmp/migrate-out.json > /tmp/migrate-meta.json
          echo "invoke metadata:"; cat /tmp/migrate-meta.json; echo
          echo "function response:"; cat /tmp/migrate-out.json; echo
          if grep -q '"FunctionError"' /tmp/migrate-meta.json; then
            echo "::error::cmm-bedek-migrate reported an error"; exit 1
          fi
